name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      # Upgrade npm before --provenance publish. Mirrors the fix the
      # WOP repo's wop-publish.yml landed in commit e5a0935 ("npm i -g
      # npm@latest before OIDC publishes"): the npm bundled with Node
      # 20's setup-node was hitting an OIDC trusted-publisher 404 from
      # the registry on PUT (after successful provenance signing). The
      # latest npm resolves the OIDC handshake correctly. Once the
      # `node-version: 20` line bumps to 22+ and ships a new-enough
      # npm by default, this step can come out.
      - name: Upgrade npm (OIDC trusted-publisher fix)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
