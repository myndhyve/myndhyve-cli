name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      # OIDC trusted publishers require npm 11.5.1+; Node 20 ships
      # 10.8.2. Without this, `npm publish` would fall back to the
      # legacy token-auth path that returns 404 once the npm org has
      # required trusted publishers (the failure mode that took down
      # the v0.4.0 publish on 2026-05-05). Mirrors the WOP repo's
      # wop-publish.yml — see commit e5a0935 there.
      - name: Upgrade npm (OIDC trusted-publisher requirement)
        run: npm install -g npm@latest

      # OIDC-authenticated publish — npm 11.5.1+ accepts the OIDC
      # token from `permissions: id-token: write` automatically. No
      # NODE_AUTH_TOKEN needed. The npmjs.com package settings must
      # have a Trusted Publisher entry pointing at this repo +
      # workflow file (same configuration as @myndhyve/wop).
      # Trusted-publisher config: npmjs.com/package/@myndhyve/cli/access.
      - name: Publish to npm (OIDC trusted publisher)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
